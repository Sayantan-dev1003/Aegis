global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    project: aegis

scrape_configs:
  - job_name: aegis-api
    static_configs:
      - targets: ["api-server:9091"]   # use Docker Compose service name, and 9091 based on docker-compose.yml
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: aegis-ml-worker
    static_configs:
      - targets: ["ml-worker:8000"]  # Python metrics port
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
